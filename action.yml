name: "Argus Security Scan"
description: "Run Argus vulnerability scans in GitHub Actions"

inputs:
  target:
    description: "Target to scan (IP, URL, domain, etc.)"
    required: true
  diff:
    description: "Enable diff-based scoped scan"
    required: false
    default: "false"
  diff_base:
    description: "Base git ref used when diff mode is enabled"
    required: false
    default: "origin/main"
  parallel:
    description: "Run agents in parallel"
    required: false
    default: "true"
  output:
    description: "Output directory for scan results"
    required: false
    default: "./argus_results"
  extra_args:
    description: "Additional args to pass to argus scan"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Argus
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run Argus scan
      shell: bash
      run: |
        CMD="argus scan \"${{ inputs.target }}\" --output \"${{ inputs.output }}\""

        if [ "${{ inputs.parallel }}" = "true" ]; then
          CMD="$CMD --parallel"
        fi

        if [ "${{ inputs.diff }}" = "true" ]; then
          CMD="$CMD --diff --diff-base \"${{ inputs.diff_base }}\""
        fi

        if [ -n "${{ inputs.extra_args }}" ]; then
          CMD="$CMD ${{ inputs.extra_args }}"
        fi

        echo "Running: $CMD"
        eval "$CMD"

    - name: Upload scan artifacts
      uses: actions/upload-artifact@v4
      with:
        name: argus-results
        path: ${{ inputs.output }}
        if-no-files-found: warn
