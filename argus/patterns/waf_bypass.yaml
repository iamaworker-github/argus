hunting_tactics:
- name: WAF Fingerprinting
  description: Identify WAF type/vendor
  payloads:
  - Check response headers for WAF signatures
  - Send known attack patterns and observe block pages
  - Use wafw00f / WhatWaf tools
- name: Parallel Request Bypass
  description: Race condition across multiple WAF nodes
  payloads:
  - Send 50+ parallel requests
  - Use HTTP/2 multiplexing for parallel streams
- name: IP Rotation
  description: Rotate source IPs to evade rate limiting
  payloads:
  - Use proxy rotating services
  - AWS Lambda/GCP Functions for IP rotation
  - VPN rotation across multiple providers
- name: Timing Attack
  description: Exploit WAF processing time differences
  payloads:
  - Measure block vs pass response times
  - Identify WAF rules by timing characteristics
waf_signatures:
  cloudflare:
    headers:
    - CF-RAY
    - 'Server: cloudflare'
    block_page: Attention Required
  modsecurity:
    headers:
    - X-Sec-Request-ID
    block_page: 403 Forbidden
  aws_waf:
    headers:
    - x-amz-id-2
    - x-amz-request-id
    block_page: 403 ERROR
  f5_asm:
    headers:
    - X-ASM-Policy
    - X-ASM-Version
    block_page: The requested URL was rejected
  akamai:
    headers:
    - X-Akamai-Transformed
    block_page: 403 Forbidden
  imperva:
    headers:
    - X-Iinfo
    - 'X-CDN: Incapsula'
    block_page: Incapsula incident ID
